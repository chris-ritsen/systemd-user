[Unit]

Before = microphone.service
Description = Rupert Neve Shelford Channel (microphone pre-amp)
BindsTo = shelford-channel.target
StopWhenUnneeded = yes

[Service]

ExecStartPost = /usr/bin/sleep 3.0

[Service]

ExecStartPost = /usr/bin/zsh -ic "sleep 4.5"
ExecStartPost = /usr/bin/zsh -ic "until nc -vzw 1 'ferrofish-a32' 23 2>/dev/null; do sleep 0.5; done"

TimeoutStartSec = 25s
TimeoutStopSec = 10s
RestartSec = 10s
